<div class="login-container">

  <div class="login-box">

    <h2>Login</h2>

    <form (ngSubmit)="login()">

      <input 
      type="email"
      [(ngModel)]="email"
      name="email"
      placeholder="Enter Email"
      required>

      <input 
      type="password"
      [(ngModel)]="password"
      name="password"
      placeholder="Enter Password"
      required>

      <button type="submit">Login</button>

    </form>

    <p>
      Don't have an account?
      <a routerLink="/register">Register</a>
    </p>

  </div>

</div>
