<!-- HERO -->
<section class="contact-hero">
  <h1>Contact Us</h1>
  <p>Have questions? Reach out to us — we'd love to hear from you.</p>
</section>

<!-- CONTACT SECTION -->
<section class="contact-container">

  <!-- LEFT : FORM -->
  <div class="contact-form">
    <h2>Send us a Message</h2>

    <form>
      <label>Name</label>
      <input type="text" placeholder="Your name">

      <label>Email</label>
      <input type="email" placeholder="you@example.com">

      <label>Message</label>
      <textarea rows="5" placeholder="Your message..."></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>

  <!-- RIGHT : CONTACT INFO -->
  <div class="contact-info">
    <h2>Get in Touch</h2>

    <p>📞 +91 98765 43210</p>
    <p>📧 info@sandhangurukul.com</p>
    <p>📍 Near Pimpalgaon Bus Stand, Maharastra</p>

    <!-- MAP -->
    <div class="map">
      <iframe 
        src= "https://www.google.com/maps?q=Sandhan+gurukul&output=embed"
        width="100%" height="250"
        style="border:0;"
        allowfullscreen=""
        loading="lazy">
      </iframe>
    </div>
  </div>

</section>
